rule:
  meta:
    name: get current process memory mapping on Linux
    namespace: host-interaction/process
    authors:
      - mehunhoff@google.com
    scopes:
      static: basic block
      dynamic: call
  features:
    - and:
      - or:
        - os: linux
        - os: android
      - match: create or open file
      - string: "/proc/self/maps"
